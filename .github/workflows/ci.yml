name: CI

on:
  push:
    branches:
      - master
      - main
      - 'v*-branch'
  pull_request:
    branches:
      - master
      - main
      - 'v*-branch'

jobs:
  ci:
    uses: humanmade/altis-dev-tools/.github/workflows/module-ci.yml@module-ci-v1
    with:
      altis-package: altis/core
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
